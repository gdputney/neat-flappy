<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEAT Flappy Web Evolution Viewer</title>
    <style>
      :root { color-scheme: light dark; font-family: Arial, sans-serif; }
      body { margin: 0; padding: 16px; background: #111; color: #eee; }
      .container { max-width: 1040px; margin: 0 auto; }
      .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; margin-bottom: 12px; }
      .control { display: flex; align-items: center; gap: 8px; }
      canvas {
        width: 1000px; max-width: 100%; aspect-ratio: 500 / 800;
        border: 1px solid #444; background: linear-gradient(#2f8dd1, #7ec0ee); display: block;
      }
      #status { opacity: 0.9; margin-bottom: 10px; }
      input[type="range"] { width: 100%; }
      .rankings { font-size: 0.9rem; opacity: 0.95; margin-top: 10px; line-height: 1.35; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>NEAT Flappy Web Evolution Viewer</h1>
      <p id="status">Loading evolution.json...</p>
      <div class="controls">
        <div class="control"><button id="playPauseBtn" type="button">Pause</button></div>
        <div>
          <label for="generationSlider">Generation</label>
          <input id="generationSlider" type="range" min="0" max="0" value="0" step="1" />
          <div>G<span id="generationValue">0</span> / <span id="generationMax">0</span></div>
        </div>
        <div>
          <label for="speedSlider">Playback speed</label>
          <input id="speedSlider" type="range" min="0.25" max="5" value="1" step="0.25" />
          <div><span id="speedValue">1.00x</span></div>
        </div>
        <div class="control">
          <label><input id="trailToggle" type="checkbox" /> Show trails</label>
        </div>
      </div>
      <canvas id="simCanvas" width="500" height="800"></canvas>
      <div class="rankings" id="rankingList"></div>
    </div>
    <script src="viewer.js"></script>
  </body>
</html>
