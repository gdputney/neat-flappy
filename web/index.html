<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Training Replay Viewer</title>
    <style>
      :root { color-scheme: dark; --bg: #070b16; --panel: #121a2d; --line: #334067; --text: #e5e7eb; --muted: #9ca3af; }
      * { box-sizing: border-box; }
      body { margin: 0; background: radial-gradient(1200px 900px at 20% -10%, #1e293b 0%, var(--bg) 45%); color: var(--text); font-family: Inter, system-ui, sans-serif; }
      .container { max-width: 1150px; margin: 0 auto; padding: 16px; }
      .hero { background: linear-gradient(145deg, rgba(37,99,235,0.2), rgba(15,23,42,0.95)); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
      .hero h1 { margin: 0 0 8px; font-size: clamp(1.3rem, 4vw, 2rem); }
      .hero p { margin: 0; color: #cbd5e1; }
      .muted { color: var(--muted); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .viewer-shell { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid var(--line); background: #0f172a; }
      canvas#simCanvas { width: 100%; height: auto; aspect-ratio: 500 / 800; display: block; }
      .overlay { position: absolute; inset: 10px auto auto 10px; width: min(96%, 400px); max-height: 92%; overflow: auto; padding: 10px; border-radius: 10px; background: rgba(15, 23, 42, 0.92); border: 1px solid rgba(148, 163, 184, 0.45); backdrop-filter: blur(2px); }
      .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; font-size: 0.86rem; margin-bottom: 10px; }
      .controls { display: grid; gap: 8px; }
      .row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
      button { border: 1px solid #4b5563; border-radius: 8px; background: #1f2937; color: #f9fafb; padding: 6px 10px; }
      input[type="range"] { width: 100%; }
      .toggle { font-size: 0.82rem; display: inline-flex; align-items: center; gap: 4px; }
      .brain-panel { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(148, 163, 184, 0.3); }
      #brainCanvas { width: 100%; border: 1px solid rgba(148, 163, 184, 0.35); border-radius: 8px; background: rgba(2, 6, 23, 0.55); }
      .brain-metrics { margin: 0; display: grid; gap: 4px; }
      .brain-metrics div { display: flex; justify-content: space-between; }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="hero">
        <h1>TRAINING REPLAY</h1>
        <p id="status">Loading training replay...</p>
        <p><span id="modeBadge" class="mono">TRAINING REPLAY</span></p>
        <p id="errorMessage" style="color:#fecaca"></p>
      </section>

      <div class="viewer-shell">
        <canvas id="simCanvas" width="500" height="800"></canvas>
        <div id="milestoneBanner"></div>
        <aside class="overlay">
          <div class="stats">
            <div>Generation: <b id="statGeneration">-</b></div>
            <div>Birds shown: <b id="statBirdsShown">0</b></div>
            <div>Alive count: <b id="statAlive">0</b></div>
            <div>Best pipes (gen): <b id="statBestGen">0</b></div>
            <div>Current pipes (champion): <b id="statBestAll">0</b></div>
            <div>Playback: <b id="statPlayback">ON</b></div>
          </div>
          <div class="controls">
            <div class="row">
              <button id="prevGenBtn" type="button">◀ Prev</button>
              <button id="playPauseBtn" type="button">Pause sim</button>
              <button id="nextGenBtn" type="button">Next ▶</button>
            </div>
            <label class="toggle"><input id="autoplayToggle" type="checkbox" checked /> Sequential autoplay</label>
            <label for="generationSlider">Generation scrubber</label>
            <input id="generationSlider" type="range" min="0" max="0" value="0" step="1" />
            <label for="speedSlider">Simulation speed</label>
            <input id="speedSlider" type="range" min="500" max="3000" value="1500" step="100" />
            <div class="row">
              <label class="toggle"><input id="trailToggle" type="checkbox" /> Trails</label>
              <label class="toggle"><input id="debugToggle" type="checkbox" /> Debug overlay</label>
              <label class="toggle"><input id="showBrainToggle" type="checkbox" /> Show Brain</label>
              <label class="toggle"><input id="showManyBirdsToggle" type="checkbox" checked /> Show many birds</label>
            </div>
          </div>
          <section id="brainPanel" class="brain-panel" hidden>
            <h2>Neural Activity (Rank 1)</h2>
            <p class="muted">Uses recorded frame outputs when available.</p>
            <div id="brainInputs"></div>
            <dl class="brain-metrics">
              <div><dt>Output:</dt><dd id="brainOutput">-</dd></div>
              <div><dt>Decision:</dt><dd id="brainDecision">-</dd></div>
              <div><dt>Flap state:</dt><dd id="brainFlapState">-</dd></div>
            </dl>
            <canvas id="brainCanvas" width="360" height="220"></canvas>
          </section>
        </aside>
      </div>

      <div id="generationDebugLine" class="mono">genIdx=0</div>
      <div class="row"><label for="rankSelector">Rank</label><select id="rankSelector"></select></div>
      <div id="rankingList"></div>
    </div>
    <script src="viewer.js"></script>
  </body>
</html>
